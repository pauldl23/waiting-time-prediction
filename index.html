<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>WaitTracker | Instant Prediction</title>
    
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.61.1/build/stlite.css" />
    
    <style>
        body {
            margin: 0;
            background-color: #fbfbfd;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #loading-container {
            text-align: center;
            transition: opacity 0.4s ease-out;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(0, 113, 227, 0.1);
            border-top: 2px solid #0071e3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1rem;
            font-weight: 600;
            color: #1d1d1f;
        }

        .progress-bar-container {
            width: 140px;
            height: 3px;
            background: #f2f2f7;
            border-radius: 2px;
            margin: 12px auto;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #0071e3;
            animation: progress 5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 98%; }
        }
    </style>
</head>
<body>
    <div id="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">WaitTracker Instant</div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
        </div>
    </div>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.61.1/build/stlite.js"></script>
    <script>
        setTimeout(() => {
            stlite.mount(
                {
                    // CRITICAL: Removed scikit-learn from initial boot.
                    // This creates a 10MB load instead of 70MB.
                    // The dashboard will load instantly.
                    requirements: ["pandas", "numpy"],
                    entrypoint: "app.py",
                    files: {
                        "app.py": { url: "./app.py" },
                        "ml_engine.py": { url: "./ml_engine.py" },
                        "Quiz_25-26.csv": { url: "./Quiz_25-26.csv" },
                        "best_model.joblib": { url: "./best_model.joblib" },
                        "model_metrics.joblib": { url: "./model_metrics.joblib" },
                    },
                },
                document.getElementById("root")
            );

            const observer = new MutationObserver(() => {
                if (document.getElementById('root').innerHTML !== "") {
                    const loader = document.getElementById('loading-container');
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 400);
                    observer.disconnect();
                }
            });
            observer.observe(document.getElementById('root'), { childList: true, subtree: true });
        }, 50);
    </script>
</body>
</html>
