<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>WaitTracker | Intelligent Analytics</title>
    
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.61.1/build/stlite.css" />
    
    <style>
        body {
            margin: 0;
            background-color: #fbfbfd;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #loading-container {
            text-align: center;
            transition: opacity 0.5s ease-out;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 113, 227, 0.1);
            border-top: 3px solid #0071e3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 8px;
        }

        .loading-subtext {
            font-size: 0.9rem;
            color: #86868b;
        }

        .progress-bar-container {
            width: 200px;
            height: 4px;
            background: #f2f2f7;
            border-radius: 2px;
            margin: 15px auto;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #0071e3;
            animation: progress 15s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes progress {
            0% { width: 0%; }
            20% { width: 30%; }
            50% { width: 60%; }
            80% { width: 90%; }
            100% { width: 95%; } /* Stays at 95 until mount finishes */
        }
    </style>
</head>
<body>
    <div id="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Optimizing WaitTracker</div>
        <div class="loading-subtext">Initializing Intelligence Engine...</div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill"></div>
        </div>
        <div class="loading-subtext" style="font-size: 0.75rem;">First load downloads Python runtime (~40MB reduced)</div>
    </div>

    <div id="root"></div>

    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.61.1/build/stlite.js"></script>
    <script>
        // Use a small timeout to ensure DOM is ready and animations start
        setTimeout(() => {
            stlite.mount(
                {
                    // Removed plotly to significantly speed up loading time
                    requirements: ["pandas", "numpy", "scikit-learn", "joblib"],
                    entrypoint: "app.py",
                    files: {
                        "app.py": { url: "./app.py" },
                        "ml_engine.py": { url: "./ml_engine.py" },
                        "Quiz_25-26.csv": { url: "./Quiz_25-26.csv" },
                        "best_model.joblib": { url: "./best_model.joblib" },
                        "model_metrics.joblib": { url: "./model_metrics.joblib" },
                    },
                },
                document.getElementById("root")
            );

            // Observe the root div for content to hide the loader
            const observer = new MutationObserver((mutations) => {
                const loader = document.getElementById('loading-container');
                if (document.getElementById('root').innerHTML !== "") {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                    observer.disconnect();
                }
            });
            observer.observe(document.getElementById('root'), { childList: true, subtree: true });
        }, 100);
    </script>
</body>
</html>
